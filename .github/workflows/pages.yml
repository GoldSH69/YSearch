name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject Password Secret
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const crypto = require('crypto');
            const pass = process.env.PASS_SECRET || '';
            let hash = '';
            if (pass) {
              hash = crypto.createHash('sha256').update(pass).digest('hex');
              console.log("Password hash computed successfully.");
            } else {
              console.warn("Warning: PASS_SECRET is empty.");
            }
            let content = fs.readFileSync('app.js', 'utf8');
            content = content.replace('__PASSWORD_HASH_PLACEHOLDER__', hash);
            fs.writeFileSync('app.js', content, 'utf8');
        env:
          PASS_SECRET: ${{ secrets.PASS }}

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
